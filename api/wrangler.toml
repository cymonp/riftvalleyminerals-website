name = "rvm-visitor-log"
main = "worker.js"
compatibility_date = "2025-01-01"

# ---------------------------------------------------------------
# KV namespace that stores one row per unique visitor IP hash.
# Create it once with:
#     wrangler kv namespace create VISITORS
# then paste the returned id below.
# ---------------------------------------------------------------
[[kv_namespaces]]
binding = "VISITORS"
id      = "REPLACE_WITH_KV_ID_AFTER_CREATING"

# ---------------------------------------------------------------
# Secrets — set with `wrangler secret put <name>`, not here:
#
#   wrangler secret put ADMIN_KEY    # protects /clear endpoint
#   wrangler secret put SALT         # pepper for IP-hashing
# ---------------------------------------------------------------

# Optional: attach a custom route so the worker answers on
# https://riftvalleyminerals.com/api/*  instead of the default
# workers.dev subdomain. Un-comment after adding the zone to
# Cloudflare DNS:
#
# [[routes]]
# pattern = "riftvalleyminerals.com/api/*"
# zone_name = "riftvalleyminerals.com"
